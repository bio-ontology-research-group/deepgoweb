/*
 * DeepGOWeb SPARQL service — embedded Apache Jena Fuseki server exposing the
 * DeepGO function-prediction property functions (dg:deepgo, dg:predict,
 * dg:components). Modernised to build on JDK 17+/21 with Gradle 8 + Jena 5.
 */

plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // SLF4J logging API + a simple binding (Jena 5 uses the SLF4J 2.x line).
    implementation 'org.slf4j:slf4j-api:2.0.13'
    implementation 'org.slf4j:slf4j-simple:2.0.13'
    // Embedded Fuseki ("main") server — the Jena 5 successor of the old
    // jena-fuseki-embedded artifact used under Jena 3.x.
    implementation 'org.apache.jena:jena-fuseki-main:5.1.0'
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'
    implementation 'org.json:json:20240303'
    implementation 'com.beust:jcommander:1.82'

    testImplementation 'junit:junit:4.13.2'
}

// Build/run on JDK 17+ (required by Jena 5); pin to the toolchain Gradle finds.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'Main'
}

run {
    if (project.hasProperty("appArgs")) {
        args Eval.me(appArgs)
    }
}
